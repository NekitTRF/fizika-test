<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест: Электромагнитные колебания. Генератор. Трансформатор</title>
    <style>
        :root {
            --bg: #f5f5f5;
            --container-bg: #ffffff;
            --text: #333333;
            --text-secondary: #666666;
            --border: #e0e0e0;
            --primary: #667eea;
            --primary-hover: #5a6fd6;
            --secondary: #764ba2;
            --answer-hover: #f8f9ff;
            --answer-selected: #eef0ff;
            --progress-bg: #e0e0e0;
            --result-correct: #f1f8e9;
            --result-wrong: #fff5f5;
            --btn-prev: #f0f0f0;
            --btn-prev-hover: #e0e0e0;
            --card-bg: #f8f9ff;
            --grade-excellent: #e8f5e9;
            --grade-good: #e3f2fd;
            --grade-satisfactory: #fff3e0;
            --grade-poor: #ffebee;
            --input-bg: #ffffff;
            --input-border: #e0e0e0;
            --shadow: rgba(0, 0, 0, 0.1);
            --timer-bg: #f0f0f0;
            --timer-warning: #ff9800;
            --timer-danger: #f44336;
        }

        [data-theme="dark"] {
            --bg: #1a1a2e;
            --container-bg: #16213e;
            --text: #e0e0e0;
            --text-secondary: #aaaaaa;
            --border: #2a2a4a;
            --primary: #7c8cf8;
            --primary-hover: #6a7ae0;
            --secondary: #9b7bc4;
            --answer-hover: #1e2a45;
            --answer-selected: #243050;
            --progress-bg: #2a2a4a;
            --result-correct: #1a2e1a;
            --result-wrong: #2e1a1a;
            --btn-prev: #2a2a4a;
            --btn-prev-hover: #3a3a5a;
            --card-bg: #1e2a45;
            --grade-excellent: #1a2e1a;
            --grade-good: #1a2040;
            --grade-satisfactory: #2e201a;
            --grade-poor: #2e1a1a;
            --input-bg: #1e2a45;
            --input-border: #3a3a5a;
            --shadow: rgba(0, 0, 0, 0.5);
            --timer-bg: #2a2a4a;
            --timer-warning: #ffab40;
            --timer-danger: #ef5350;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background 0.3s;
        }

        .container {
            background: var(--container-bg);
            border-radius: 20px;
            box-shadow: 0 20px 60px var(--shadow);
            max-width: 850px;
            width: 100%;
            padding: 30px;
            animation: fadeIn 0.5s ease;
            transition: background 0.3s, box-shadow 0.3s;
            position: relative;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Кнопка темы */
        .theme-toggle {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 20px;
            background: var(--card-bg);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        /* Экран выбора */
        .selection-screen h1 {
            text-align: center;
            color: var(--text);
            margin-bottom: 10px;
            font-size: 22px;
        }

        .selection-screen .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 20px;
            font-size: 14px;
        }

        .selection-screen .info {
            text-align: center;
            color: var(--primary);
            margin-bottom: 25px;
            font-size: 16px;
            font-weight: bold;
        }

        /* Настройки */
        .settings-panel {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: center;
        }

        .settings-panel label {
            color: var(--text);
            font-size: 13px;
        }

        .settings-panel input,
        .settings-panel select {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            width: 80px;
            transition: all 0.3s;
        }

        .settings-panel input:focus,
        .settings-panel select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .selection-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .topic-btn {
            padding: 20px;
            border: 2px solid var(--primary);
            background: var(--container-bg);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            color: var(--text);
        }

        .topic-btn:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .topic-btn .range {
            font-weight: bold;
            font-size: 18px;
            display: block;
            margin-bottom: 5px;
        }

        .topic-btn .theme {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .topic-btn:hover .theme {
            color: #e0e0e0;
        }

        .full-test-btn {
            margin-top: 20px;
            padding: 18px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
            width: 100%;
        }

        .full-test-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(118, 75, 162, 0.5);
        }

        .random-btn {
            margin-top: 10px;
            padding: 14px;
            border: 2px dashed var(--primary);
            background: var(--card-bg);
            color: var(--primary);
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            width: 100%;
        }

        .random-btn:hover {
            background: var(--primary);
            color: white;
        }

        /* Экран теста */
        .test-screen {
            display: none;
        }

        .timer-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .timer-bar .timer-icon {
            font-size: 20px;
        }

        .timer-bar .timer-progress {
            flex: 1;
            height: 8px;
            background: var(--progress-bg);
            border-radius: 4px;
            overflow: hidden;
        }

        .timer-bar .timer-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 4px;
            transition: width 0.1s linear, background 0.5s;
        }

        .timer-bar .timer-fill.warning {
            background: var(--timer-warning);
        }

        .timer-bar .timer-fill.danger {
            background: var(--timer-danger);
            animation: pulse 0.5s infinite;
        }

        .timer-bar .timer-text {
            font-size: 14px;
            font-weight: bold;
            color: var(--text);
            min-width: 40px;
            text-align: center;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .test-screen .progress-bar {
            height: 6px;
            background: var(--progress-bg);
            border-radius: 3px;
            margin-bottom: 20px;
        }

        .test-screen .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 3px;
            transition: width 0.3s;
        }

        .test-screen .question-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: var(--text-secondary);
            font-size: 13px;
        }

        .test-screen .question {
            font-size: 16px;
            font-weight: bold;
            color: var(--text);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .answers {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .answer-option {
            padding: 15px 20px;
            border: 2px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text);
        }

        .answer-option:hover {
            border-color: var(--primary);
            background: var(--answer-hover);
        }

        .answer-option.selected {
            border-color: var(--primary);
            background: var(--answer-selected);
        }

        .answer-option .radio {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s;
        }

        .answer-option.selected .radio {
            border-color: var(--primary);
        }

        .answer-option.selected .radio::after {
            content: '';
            width: 10px;
            height: 10px;
            background: var(--primary);
            border-radius: 50%;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .nav-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .nav-btn.prev {
            background: var(--btn-prev);
            color: var(--text);
        }

        .nav-btn.prev:hover {
            background: var(--btn-prev-hover);
        }

        .nav-btn.next {
            background: var(--primary);
            color: white;
            flex: 1;
        }

        .nav-btn.next:hover {
            background: var(--primary-hover);
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .back-btn {
            padding: 10px 20px;
            border: 1px solid var(--border);
            background: var(--container-bg);
            color: var(--text);
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            margin-top: 10px;
            transition: all 0.3s;
            width: 100%;
        }

        .back-btn:hover {
            background: var(--card-bg);
        }

        /* Экран результатов */
        .result-screen {
            display: none;
        }

        .result-screen h2 {
            text-align: center;
            color: var(--text);
            margin-bottom: 20px;
        }

        .result-summary {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .result-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .result-card .number {
            font-size: 28px;
            font-weight: bold;
            color: var(--primary);
        }

        .result-card .label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .grade {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 12px;
        }

        .grade.excellent {
            background: var(--grade-excellent);
            color: #2e7d32;
        }
        .grade.good {
            background: var(--grade-good);
            color: #1565c0;
        }
        .grade.satisfactory {
            background: var(--grade-satisfactory);
            color: #e65100;
        }
        .grade.poor {
            background: var(--grade-poor);
            color: #c62828;
        }

        [data-theme="dark"] .grade.excellent {
            color: #66bb6a;
        }
        [data-theme="dark"] .grade.good {
            color: #64b5f6;
        }
        [data-theme="dark"] .grade.satisfactory {
            color: #ffb74d;
        }
        [data-theme="dark"] .grade.poor {
            color: #ef5350;
        }

        .result-details {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 10px;
        }

        .result-item {
            padding: 10px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            color: var(--text);
        }

        .result-item.correct {
            background: var(--result-correct);
            border-left: 3px solid #4caf50;
        }

        .result-item.wrong {
            background: var(--result-wrong);
            border-left: 3px solid #f44336;
        }

        .result-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .result-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            min-width: 120px;
        }

        .btn-retry {
            background: var(--primary);
            color: white;
        }

        .btn-reference {
            background: #fff3e0;
            color: #e65100;
        }

        .btn-home {
            background: var(--btn-prev);
            color: var(--text);
        }

        /* Справочник */
        .reference-screen {
            display: none;
        }

        .reference-screen h2 {
            text-align: center;
            margin-bottom: 20px;
            color: var(--text);
        }

        .reference-content {
            max-height: 500px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .reference-item {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        .reference-item .ref-question {
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--text);
        }

        .reference-item .ref-answer {
            color: #4caf50;
            padding-left: 10px;
            border-left: 3px solid #4caf50;
        }

        /* Задачи */
        .problems-screen {
            display: none;
        }

        /* Скроллбар */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--progress-bg);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 3px;
        }

        /* Адаптивность */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .selection-buttons {
                grid-template-columns: 1fr;
            }

            .result-summary {
                grid-template-columns: repeat(2, 1fr);
            }

            .nav-buttons {
                flex-direction: column;
            }

            .settings-panel {
                flex-direction: column;
                align-items: stretch;
            }

            .settings-panel input,
            .settings-panel select {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- Кнопка темы -->
        <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Тёмный/светлый режим">🌙</button>

        <!-- Экран выбора -->
        <div class="selection-screen" id="selectionScreen">
            <h1>Электромагнитные колебания</h1>
            <p class="subtitle">Генератор переменного тока. Трансформатор</p>

            <!-- Настройки -->
            <div class="settings-panel">
                <label>⏱ Секунд на вопрос:</label>
                <input type="number" id="timePerQuestion" value="0" min="0" max="300" step="5">
                <span style="font-size:11px;color:var(--text-secondary)">(0 = без таймера)</span>
            </div>

            <p class="info">Выберите раздел теста</p>

            <div class="selection-buttons">
                <button class="topic-btn" onclick="startTest(1, 10)">
                    <span class="range">Вопросы 1-10</span>
                    <span class="theme">Основы электромагнитных колебаний</span>
                </button>
                <button class="topic-btn" onclick="startTest(11, 20)">
                    <span class="range">Вопросы 11-20</span>
                    <span class="theme">Колебательный контур и генератор</span>
                </button>
                <button class="topic-btn" onclick="startTest(21, 30)">
                    <span class="range">Вопросы 21-30</span>
                    <span class="theme">Генератор и трансформатор</span>
                </button>
                <button class="topic-btn" onclick="startTest(31, 40)">
                    <span class="range">Вопросы 31-40</span>
                    <span class="theme">Трансформатор и энергия</span>
                </button>
            </div>

            <button class="full-test-btn" onclick="startTest(1, 40)">
                📋 Полный тест (39 вопросов)
            </button>

            <button class="random-btn" onclick="startRandomTest()">
                🎲 Случайные вопросы
            </button>

            <button class="random-btn" style="margin-top:5px; border-color:#4caf50; color:#4caf50;" onclick="showReference()">
                📖 Справочник (все ответы)
            </button>

            <button class="random-btn" style="margin-top:5px; border-color:#ff9800; color:#ff9800;" onclick="showProblems()">
                📐 Задачи (6 задач)
            </button>
        </div>

        <!-- Экран теста -->
        <div class="test-screen" id="testScreen">
            <!-- Таймер -->
            <div class="timer-bar" id="timerBar" style="display:none;">
                <span class="timer-icon">⏱</span>
                <div class="timer-progress">
                    <div class="timer-fill" id="timerFill" style="width:100%"></div>
                </div>
                <span class="timer-text" id="timerText">0</span>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            <div class="question-meta">
                <span id="questionNumber"></span>
                <span id="originalNumber"></span>
            </div>
            <div class="question" id="questionText"></div>
            <div class="answers" id="answersContainer"></div>
            <div class="nav-buttons">
                <button class="nav-btn prev" id="prevBtn" onclick="prevQuestion()">← Назад</button>
                <button class="nav-btn next" id="nextBtn" onclick="nextQuestion()" disabled>Выберите ответ</button>
            </div>
            <button class="back-btn" onclick="confirmExitTest()">↩ Вернуться к выбору</button>
        </div>

        <!-- Экран результатов -->
        <div class="result-screen" id="resultScreen">
            <h2>Результаты теста</h2>
            <div class="result-summary">
                <div class="result-card">
                    <div class="number" id="totalQuestions">0</div>
                    <div class="label">Вопросов</div>
                </div>
                <div class="result-card">
                    <div class="number" id="correctAnswers">0</div>
                    <div class="label">Правильных</div>
                </div>
                <div class="result-card">
                    <div class="number" id="percentage">0%</div>
                    <div class="label">Процент</div>
                </div>
                <div class="result-card">
                    <div class="number" id="timeElapsed">0:00</div>
                    <div class="label">Затрачено</div>
                </div>
            </div>
            <div class="grade" id="grade"></div>
            <div class="result-details" id="resultDetails"></div>
            <div class="result-buttons">
                <button class="btn-retry" onclick="retryTest()">🔄 Пройти заново</button>
                <button class="btn-reference" onclick="showReference()">📖 Справочник</button>
                <button class="btn-home" onclick="goToSelection()">🏠 На главную</button>
            </div>
        </div>

        <!-- Экран справочника -->
        <div class="reference-screen" id="referenceScreen">
            <h2>📖 Справочник - Все ответы</h2>
            <div class="reference-content" id="referenceContent"></div>
            <button class="back-btn" style="margin-top:15px; width:100%;" onclick="goToSelection()">↩ На главную</button>
        </div>

        <!-- Экран задач -->
        <div class="test-screen problems-screen" id="problemsScreen">
            <div class="question-meta">
                <span id="problemNumber"></span>
            </div>
            <div class="question" id="problemTitle" style="color:#764ba2;"></div>
            <div class="question" id="problemText" style="font-weight:normal; white-space:pre-line;"></div>
            <div id="problemCanvas" style="text-align:center; margin:15px 0;"></div>
            <div id="problemSolution" style="display:none; background:var(--result-correct); padding:15px; border-radius:10px; margin:15px 0; border-left:4px solid #4caf50; color:var(--text); white-space:pre-line;"></div>
            <div class="nav-buttons">
                <button class="nav-btn prev" id="problemPrevBtn" onclick="prevProblem()">← Назад</button>
                <button class="nav-btn next" id="problemSolutionBtn" onclick="toggleProblemSolution()" style="background:#fff3e0; color:#e65100; flex:1;">Показать решение</button>
                <button class="nav-btn next" id="problemNextBtn" onclick="nextProblem()">Вперед →</button>
            </div>
            <button class="back-btn" onclick="goToSelection()">↩ На главную</button>
        </div>
    </div>

    <script>
        // Все вопросы
        const allQuestions = [
            { id: 1, question: "Что называется электромагнитными колебаниями?", answers: [
                    "Распространение электромагнитного поля в среде",
                    "Периодическое перемещение электрических зарядов то в одну, то в другую сторону",
                    "Одновременное периодическое изменение связанных между собой электрического и магнитного полей"
                ], correct: 2 },
            { id: 2, question: "Электромагнитные колебания будут затухающими, если они возникают", answers: [
                    "В реальном контуре", "В идеальном контуре", "В автоколебательной системе"
                ], correct: 0 },
            { id: 3,
                question: "Какая физическая величина НЕ изменяется в колебательном контуре при получении электромагнитных колебаний?",
                answers: ["Напряжение", "Сила тока", "Электроемкость", "Магнитная индукция", "Магнитный поток"],

        // Тёмный режим
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? '' : 'dark';
            html.setAttribute('data-theme', newTheme);
            document.getElementById('themeToggle').textContent = newTheme === 'dark' ? '☀️' : '🌙';
            localStorage.setItem('theme', newTheme);
        }

        // Загрузка темы
        (function() {
            const savedTheme = localStorage.getItem('theme');

        // Функции навигации по экранам
        function showScreen(screenId) {
            document.getElementById('selectionScreen').style.display = 'none';

            document.getElementById('resultScreen').style.display = 'none';
            document.getElementById('referenceScreen').style.display = 'none';

            if (screenId) {
                document.getElementById(screenId).style.display = 'block';

        function goToSelection() {
            stopTimer();
            showScreen('selectionScreen');
        }

        function confirmExitTest() {
            if (currentQuestionIndex < currentTestQuestions.length && userAnswers.some(a => a !== null)) {
                if (confirm('У вас есть неотвеченные вопросы. Вы уверены, что хотите выйти?')) {
                    stopTimer();
                    goToSelection();
                }
            } else {
                stopTimer();
                goToSelection();
            }
        }

        function startTest(startId, endId) {
            const filtered = allQuestions.filter(q => q.id >= startId && q.id <= endId);
            if (filtered.length === 0) {
                alert('Нет вопросов в выбранном диапазоне');
                return;
            }
            currentTestQuestions = [...filtered];
            startTestSession();
        }

        function startRandomTest() {
            const shuffled = [...allQuestions].sort(() => Math.random() - 0.5);
            const count = Math.min(10, shuffled.length);
            currentTestQuestions = shuffled.slice(0, count);
            startTestSession();
        }

        function startTestSession() {
            currentQuestionIndex = 0;
            userAnswers = new Array(currentTestQuestions.length).fill(null);
            timePerQuestion = parseInt(document.getElementById('timePerQuestion').value) || 0;
            testStartTime = new Date();
            testEndTime = null;

            showScreen('testScreen');
            showQuestion();
        }

        function startQuestionTimer() {
            stopTimer();
            if (timePerQuestion <= 0) {
                document.getElementById('timerBar').style.display = 'none';
                return;
            }

            document.getElementById('timerBar').style.display = 'flex';
            questionTimeLeft = timePerQuestion;
            updateTimerDisplay();

            timerInterval = setInterval(() => {
                questionTimeLeft -= 0.1;
                if (questionTimeLeft <= 0) {
                    questionTimeLeft = 0;
                    stopTimer();
                    // Автоматически перейти к следующему вопросу
                    if (userAnswers[currentQuestionIndex] === null) {
                        userAnswers[currentQuestionIndex] = -1; // Помечаем как пропущенный
                    }
                    if (currentQuestionIndex < currentTestQuestions.length - 1) {
                        currentQuestionIndex++;
                        showQuestion();
                    } else {
                        showResult();
                    }
                }
                updateTimerDisplay();
            }, 100);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function updateTimerDisplay() {
            const seconds = Math.ceil(questionTimeLeft);
            const total = timePerQuestion;
            const percentage = (questionTimeLeft / total) * 100;

            const fill = document.getElementById('timerFill');
            fill.style.width = percentage + '%';
            fill.classList.remove('warning', 'danger');

            if (percentage <= 25) {
                fill.classList.add('danger');
            } else if (percentage <= 50) {
                fill.classList.add('warning');
            }

            document.getElementById('timerText').textContent = seconds + 'с';
        }

        function showQuestion() {
    if (currentQuestionIndex >= currentTestQuestions.length) {
        showResult();
        return;
    }

    const q = currentTestQuestions[currentQuestionIndex];

    document.getElementById('questionNumber').textContent =
        `Вопрос ${currentQuestionIndex + 1} из ${currentTestQuestions.length}`;
    document.getElementById('originalNumber').textContent =
        `Оригинальный №${q.id}`;
    document.getElementById('questionText').textContent = q.question;

    const progress = (currentQuestionIndex / currentTestQuestions.length) * 100;
    document.getElementById('progressFill').style.width = progress + '%';

    const answersContainer = document.getElementById('answersContainer');
    answersContainer.innerHTML = '';

    q.answers.forEach((answer, index) => {
        const div = document.createElement('div');
        div.className = 'answer-option';
        
        if (q.isImage && q.images) {
            div.innerHTML = `
                <div class="radio"></div>
                <div style="display:flex; flex-direction:column; gap:8px; width:100%;">
                    <span>${answer}</span>
                    <img src="${q.images[index]}" alt="${answer}" style="max-width:100%; border-radius:8px; border:2px solid var(--border);">
                </div>
            `;
            div.style.flexDirection = 'column';
            div.style.alignItems = 'flex-start';
        } else {
            div.innerHTML = `
                <div class="radio"></div>
                <span>${answer}</span>
            `;
        }

        if (userAnswers[currentQuestionIndex] === index) {
            div.classList.add('selected');
        }

        div.onclick = () => selectAnswer(index);
        answersContainer.appendChild(div);
    });

    updateNavButtons();
    startQuestionTimer();
}

        function selectAnswer(index) {
            userAnswers[currentQuestionIndex] = index;

            const options = document.querySelectorAll('.answer-option');
            options.forEach((opt, i) => {
                opt.classList.toggle('selected', i === index);
            });

            document.getElementById('nextBtn').disabled = false;
            document.getElementById('nextBtn').textContent =
                currentQuestionIndex === currentTestQuestions.length - 1 ? 'Завершить' : 'Вперед →';
        }

        function nextQuestion() {
            if (userAnswers[currentQuestionIndex] === null) return;

            stopTimer();

            if (currentQuestionIndex < currentTestQuestions.length - 1) {
                currentQuestionIndex++;
                showQuestion();
                document.getElementById('nextBtn').disabled = true;
                document.getElementById('nextBtn').textContent = 'Выберите ответ';
            } else {
                showResult();
            }
        }

        function prevQuestion() {
            stopTimer();
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                showQuestion();
                const answered = userAnswers[currentQuestionIndex] !== null;
                document.getElementById('nextBtn').disabled = !answered;
                document.getElementById('nextBtn').textContent =
                    currentQuestionIndex === currentTestQuestions.length - 1 ? 'Завершить' : 'Вперед →';
            }
        }

        function updateNavButtons() {
            document.getElementById('prevBtn').disabled = currentQuestionIndex === 0;
            const answered = userAnswers[currentQuestionIndex] !== null;
            document.getElementById('nextBtn').disabled = !answered;
            document.getElementById('nextBtn').textContent =
                currentQuestionIndex === currentTestQuestions.length - 1 ? 'Завершить' : 'Вперед →';
        }

        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec.toString().padStart(2, '0')}`;
        }

        function showResult() {
            stopTimer();
            testEndTime = new Date();
            const totalTimeSeconds = Math.round((testEndTime - testStartTime) / 1000);

            showScreen('resultScreen');

            let correctCount = 0;
            currentTestQuestions.forEach((q, i) => {
                if (userAnswers[i] === q.correct) correctCount++;
            });

            const total = currentTestQuestions.length;
            const percentage = Math.round((correctCount / total) * 100);

            document.getElementById('totalQuestions').textContent = total;
            document.getElementById('correctAnswers').textContent = correctCount;
            document.getElementById('percentage').textContent = percentage + '%';
            document.getElementById('timeElapsed').textContent = formatTime(totalTimeSeconds);

            // Оценка
            let gradeText, gradeClass;
            if (percentage >= 85) { gradeText = '5 (Отлично)';
                gradeClass = 'excellent'; } else if (percentage >= 70) { gradeText = '4 (Хорошо)';
                gradeClass = 'good'; } else if (percentage >= 50) { gradeText = '3 (Удовлетворительно)';
                gradeClass = 'satisfactory'; } else { gradeText = '2 (Неудовлетворительно)';
                gradeClass = 'poor'; }

            const gradeEl = document.getElementById('grade');
            gradeEl.textContent = `Оценка: ${gradeText} | Время: ${formatTime(totalTimeSeconds)}`;
            gradeEl.className = 'grade ' + gradeClass;

            // Детали
            const detailsEl = document.getElementById('resultDetails');
            detailsEl.innerHTML = '';

            const sorted = currentTestQuestions.map((q, i) => ({ q, i })).sort((a, b) => a.q.id - b.q.id);

            sorted.forEach(({ q, i }) => {
                const div = document.createElement('div');
                const isCorrect = userAnswers[i] === q.correct;
                div.className = 'result-item ' + (isCorrect ? 'correct' : 'wrong');

                let text = `${q.id}. ${isCorrect ? '✓' : '✗'} `;
                if (userAnswers[i] !== null && userAnswers[i] !== -1) {
                    text += `Ваш ответ: ${q.answers[userAnswers[i]].substring(0, 50)}... `;
                } else if (userAnswers[i] === -1) {
                    text += 'Время вышло ';
                } else {
                    text += 'Нет ответа ';
                }
                if (!isCorrect) {
                    text += `| Правильно: ${q.answers[q.correct].substring(0, 50)}...`;
                }
                div.textContent = text;
                detailsEl.appendChild(div);
            });
        }

            stopTimer();

        function drawGraph() {
            const canvas = document.getElementById('graphCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const textColor = isDark ? '#e0e0e0' : '#333';
            const gridColor = isDark ? '#2a2a4a' : '#e0e0e0';

            ctx.clearRect(0, 0, w, h);

            // Оси
            ctx.strokeStyle = textColor;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(40, 20);
            ctx.lineTo(40, 220);
            ctx.lineTo(370, 220);
            ctx.stroke();

            ctx.fillStyle = textColor;
            ctx.font = '11px Arial';
            ctx.fillText('ε, В', 5, 15);
            ctx.fillText('t, с', 375, 225);
            ctx.fillText('0', 30, 235);

            // Шкала
            ctx.strokeStyle = gridColor;
            ctx.lineWidth = 1;
            for (let v = -50; v <= 50; v += 25) {
                const y = 120 - v * 2;
                ctx.beginPath();
                ctx.moveTo(35, y);
                ctx.lineTo(45, y);
                ctx.stroke();
                ctx.fillStyle = textColor;
                ctx.fillText(v, 10, y + 4);
            }
            for (let t = 1; t <= 4; t++) {
                const x = 40 + t * 80;
                ctx.beginPath();
                ctx.moveTo(x, 215);
                ctx.lineTo(x, 225);
                ctx.stroke();
                ctx.fillStyle = textColor;
                ctx.fillText(t, x - 3, 240);
            }

            // Синусоида
            ctx.strokeStyle = '#e53935';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            for (let px = 40; px <= 360; px++) {
                const t = (px - 40) / 80;
                const e = 50 * Math.sin(Math.PI * t / 2);
                const py = 120 - e * 2;
                if (px === 40) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.stroke();

            // Точка при t=1
            const x1 = 40 + 80;
            const y1 = 120 - 50 * 2;
            ctx.fillStyle = '#1565c0';
            ctx.beginPath();
            ctx.arc(x1, y1, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillText('t=1с, ε=50В', x1 + 10, y1 - 10);
        }

        function toggleProblemSolution() {
            const solDiv = document.getElementById('problemSolution');
            const btn = document.getElementById('problemSolutionBtn');

            if (problemSolutionVisible) {
                solDiv.style.display = 'none';
                btn.textContent = 'Показать решение';
                problemSolutionVisible = false;
            } else {
                solDiv.textContent = problems[currentProblemIndex].solution;
                solDiv.style.display = 'block';
                btn.textContent = 'Скрыть решение';
                problemSolutionVisible = true;
            }
        }

        function nextProblem() {
            if (currentProblemIndex < problems.length - 1) {
                currentProblemIndex++;
                problemSolutionVisible = false;
                showProblem();
            }
        }

        function prevProblem() {
            if (currentProblemIndex > 0) {
                currentProblemIndex--;
                problemSolutionVisible = false;
                showProblem();
            }
        }

        function updateProblemButtons() {
            document.getElementById('problemPrevBtn').disabled = currentProblemIndex === 0;
            document.getElementById('problemNextBtn').disabled = currentProblemIndex === problems.length - 1;
        }

        // Перерисовка графика при смене темы
        const origToggleTheme = toggleTheme;
        toggleTheme = function() {
            origToggleTheme();
            if (document.getElementById('problemsScreen').style.display === 'block' && problems[
                    currentProblemIndex]?.hasGraph) {
                drawGraph();
            }
        };

        // Инициализация
        showScreen('selectionScreen');
    </script>
</body>
</html>
